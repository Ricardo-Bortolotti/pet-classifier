services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app/models:/app/app/models
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
      - ./inference_monitoring.db:/app/inference_monitoring.db
    environment:
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db
      - PETVISION_MODEL_SOURCE=registry
      - MLFLOW_REGISTERED_MODEL_NAME=petvision-classifier
      - MLFLOW_MODEL_STAGE=Production
      - PETVISION_INFERENCE_DB=/app/inference_monitoring.db
      - PETVISION_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: .
    command: ["uv", "run", "streamlit", "run", "app/frontend/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./app/frontend:/app/app/frontend
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.0
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlruns

services:
  - type: web
    name: petvision-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: uv run uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: MODEL_URL
        sync: false
      - key: PETVISION_MODEL_SOURCE
        value: local
      - key: PETVISION_LOG_LEVEL
        value: INFO
      - key: REQUIRE_MODEL
        value: "true"
